prefix: "<gray>[<gold>Hazestore</gold>]</gray>"
rotation: "1d 0h 0m"
currency: "gold"


gui:
  title: "<b><color:#2B2B2B><b>haze store</b></color></b>"
  slots: [21, 22, 23]
  filler:
    material: "BLACK_STAINED_GLASS_PANE"
    name: " "
  lore:
    price: "<gold>Price: </gold><yellow>{price} {currency}</yellow>"
    purchase-hint: "<gray>Click to <green>purchase</green>!</gray>"

messages:
  no-permission: "<red>You do not have permission to do this.</red>"
  reloaded: "<green>Plugin reloaded successfully!</green>"
  not-enough-coins: "<red>You don't have enough {currency} to buy this!</red>"
  inventory-full: "<red>Your inventory is full!</red>"
  purchased: "<green>You successfully purchased {item} for {price} {currency}!</green>"
  rotation-forced: "<green>Store pool manually rotated!</green>"
  store-rotated: "<gold>The Mysterious Man has changed his trades! Check out the store with /hs!</gold>"
  warnings:
    60: "<yellow>The mysterious man is about to change his trades in 1 hour!</yellow>"
    10: "<yellow>The mysterious man is about to change his trades in 10 minutes!</yellow>"
    1: "<yellow>The mysterious man is about to change his trades in 1 minute!</yellow>"

sounds:
  gui-open:
    sound: "BLOCK_CHEST_OPEN"
    volume: 1.0
    pitch: 1.0
  purchase:
    sound: "ENTITY_PLAYER_LEVELUP"
    volume: 1.0
    pitch: 1.0
  force-rotate:
    sound: "BLOCK_NOTE_BLOCK_PLING"
    volume: 1.0
    pitch: 1.0

